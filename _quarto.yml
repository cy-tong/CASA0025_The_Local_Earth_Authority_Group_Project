project:
  type: website
  output-dir: docs

website:
  title: "The Local Earth Authority"
  favicon: favicon.ico
  page-navigation: true
  site-url: "https://cy-tong.github.io/CASA0025_The_Local_Earth_Authority_Group_Project/"
  repo-url: "https://github.com/cy-tong/CASA0025_The_Local_Earth_Authority_Group_Project"
  repo-actions: [edit, issue]
  page-footer:
    background: "#0d1117"
    foreground: "#8b949e"
    left: "<div style='text-align: left; font-size: 0.85em;'>CASA0025 Group Project &nbsp;|&nbsp; The Local Earth Authority &nbsp;|&nbsp; UCL CASA 2025&ndash;26</div>"
    right:
      - "<span style='margin-right: 6px; font-size: 0.85em;'>Source code:</span>"
      - icon: github
        href: "https://github.com/cy-tong/CASA0025_The_Local_Earth_Authority_Group_Project"
        target: "_blank"
  navbar:
    logo: logo.png
    logo-alt: "The Local Earth Authority"
    title: false
    background: "#0d1117"
    foreground: "#e6edf3"
    pinned: true
    right:
      - text: "Home"
        href: index.qmd
      - icon: github
        href: "https://github.com/cy-tong/CASA0025_The_Local_Earth_Authority_Group_Project"
        target: "_blank"

format:
  html:
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    toc-location: right
    theme:
      dark: darkly
      light: cosmo
    css: style.css
    code-copy: true
    code-overflow: wrap
    code-fold: show
    code-summary: "Show the code"
    highlight-style: monokai.theme
    linkcolor: "#34a832"
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 900px
      sidebar-width: 250px
      margin-width: 250px
